<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OopsTracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#111318;
  --bg2:#181c22;
  --bg3:#1f242c;
  --border:#2a2f38;
  --text:#e8e6e1;
  --muted:#6b7280;
  --amber:#d4842a;
  --amber-dim:#8a5218;
  --red:#c0392b;
  --green:#2d9c5f;
  --radius:6px;
  --mono:'IBM Plex Mono',monospace;
  --sans:'Inter',sans-serif;
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.5}

.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;border-right:1px solid var(--border);display:flex;flex-direction:column}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}

.brand{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.brand h1{font-family:var(--mono);font-size:15px;font-weight:500;letter-spacing:-0.3px;color:var(--amber)}
.brand span{font-family:var(--mono);font-size:10px;color:var(--muted);display:block;margin-top:2px}

.nav{padding:16px 12px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius);cursor:pointer;color:var(--muted);font-size:13px;font-weight:400;transition:color .15s,background .15s;border:none;background:none;width:100%;text-align:left}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{color:var(--text);background:var(--bg3)}

.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:10px}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--amber-dim);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;color:var(--amber);flex-shrink:0}
.user-name{font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;padding:2px;display:flex;align-items:center}
.logout-btn:hover{color:var(--red)}

.topbar{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:18px;font-weight:600;letter-spacing:-0.3px}
.topbar-right{display:flex;gap:10px;align-items:center}

.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;font-family:var(--sans);cursor:pointer;border:1px solid transparent;transition:all .15s}
.btn-primary{background:var(--amber);color:#111;border-color:var(--amber)}
.btn-primary:hover{background:#c07820}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--muted);border-color:var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text)}
.btn-danger{background:transparent;color:var(--red);border-color:var(--border)}
.btn-danger:hover{border-color:var(--red)}
.btn-sm{padding:5px 11px;font-size:12px}

/* AUTH */
.auth-wrap{height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.auth-box{width:360px}
.auth-logo{font-family:var(--mono);font-size:20px;color:var(--amber);margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:36px}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px}
.auth-tab{padding:8px 0;margin-right:24px;font-size:14px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-left:none;border-right:none;border-top:none;font-family:var(--sans)}
.auth-tab.active{color:var(--text);border-bottom-color:var(--amber)}
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:0.3px;text-transform:uppercase}
.field input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 13px;color:var(--text);font-size:14px;font-family:var(--sans);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--amber)}
.field input::placeholder{color:var(--muted)}
.auth-err{font-size:13px;color:var(--red);margin-bottom:14px;min-height:18px}

/* HABITS */
.content-wrap{padding:28px 32px}
.empty-state{text-align:center;padding:80px 20px;color:var(--muted)}
.empty-state .big{font-size:28px;margin-bottom:8px}
.empty-state p{font-size:14px;line-height:1.6;max-width:260px;margin:0 auto 20px}

.habit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.habit-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px;cursor:pointer;transition:border-color .15s}
.habit-card:hover{border-color:#3a3f48}
.habit-card.logged{border-left:3px solid var(--green)}
.hc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.hc-name{font-size:15px;font-weight:500;color:var(--text);margin-bottom:3px}
.hc-freq{font-size:11px;color:var(--muted);font-family:var(--mono);text-transform:uppercase}
.hc-streak{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--amber);line-height:1}
.hc-streak span{font-size:10px;color:var(--muted);display:block;margin-top:2px;font-weight:400}
.hc-actions{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.log-btn{flex:1}
.log-btn.done{background:transparent;color:var(--green);border-color:var(--green);cursor:default}

/* DETAIL */
.back-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;padding:0;font-family:var(--sans)}
.back-btn:hover{color:var(--text)}
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px}
.detail-title{font-size:24px;font-weight:600;letter-spacing:-0.4px;margin-bottom:4px}
.detail-desc{color:var(--muted);font-size:14px}
.stat-row{display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:18px 22px;min-width:130px}
.stat-num{font-family:var(--mono);font-size:28px;font-weight:500;color:var(--amber);line-height:1;margin-bottom:4px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px}

.log-list{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.log-list-header{padding:14px 20px;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px}
.log-item{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:13px}
.log-item:last-child{border-bottom:none}
.log-date{color:var(--text);font-family:var(--mono)}
.log-done{color:var(--green);font-size:11px;text-transform:uppercase;letter-spacing:0.4px}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .15s}
.modal-backdrop.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:28px;width:420px;max-width:90vw;transform:translateY(8px);transition:transform .15s}
.modal-backdrop.open .modal{transform:none}
.modal h3{font-size:17px;font-weight:600;margin-bottom:20px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}

select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 13px;color:var(--text);font-size:14px;font-family:var(--sans);outline:none;transition:border-color .15s;appearance:none}
select:focus{border-color:var(--amber)}

.toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:200}
.toast{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px 16px;font-size:13px;color:var(--text);animation:slide-in .2s ease;max-width:280px}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.success{border-color:var(--green);color:var(--green)}
@keyframes slide-in{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.spin{width:14px;height:14px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

.section-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;padding:6px 10px 4px}

@media(max-width:600px){
  .sidebar{display:none}
  .content-wrap{padding:20px 18px}
  .topbar{padding:16px 18px}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-page" class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">OopsTracker</div>
    <div class="auth-sub">for humans who sometimes forget</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign in</button>
      <button class="auth-tab" onclick="switchTab('register')">Register</button>
    </div>
    <div id="auth-err" class="auth-err"></div>

    <div id="login-form">
      <div class="field"><label>Email</label><input type="email" id="l-email" placeholder="you@example.com"/></div>
      <div class="field"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••"/></div>
      <button class="btn btn-primary" id="l-btn" style="width:100%" onclick="doLogin()">
        <span id="l-spin" style="display:none" class="spin"></span>Sign in
      </button>
    </div>

    <div id="register-form" style="display:none">
      <div class="field"><label>Name</label><input type="text" id="r-name" placeholder="Your name"/></div>
      <div class="field"><label>Email</label><input type="email" id="r-email" placeholder="you@example.com"/></div>
      <div class="field"><label>Password</label><input type="password" id="r-pass" placeholder="••••••••"/></div>
      <button class="btn btn-primary" id="r-btn" style="width:100%" onclick="doRegister()">
        <span id="r-spin" style="display:none" class="spin"></span>Create account
      </button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="app" style="display:none">
  <div class="sidebar">
    <div class="brand">
      <h1>OopsTracker</h1>
      <span>stay mostly consistent</span>
    </div>
    <nav class="nav">
      <div class="section-label">Menu</div>
      <button class="nav-item active" onclick="showView('habits')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
        Habits
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="avatar" id="user-avatar">?</div>
        <div class="user-name" id="user-name-display">—</div>
        <button class="logout-btn" onclick="doLogout()" title="Sign out">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 3H3a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h3M10 5l3 3-3 3M13 8H6"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="main">
    <div id="view-habits" style="display:flex;flex-direction:column;flex:1">
      <div class="topbar">
        <h2>Habits</h2>
        <div class="topbar-right">
          <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ New habit</button>
        </div>
      </div>
      <div class="content-wrap" id="habits-container">
        <div class="empty-state">
          <div class="big">📋</div>
          <p>No habits yet. Add one and start your streak.</p>
          <button class="btn btn-primary" onclick="openAddModal()">+ Add habit</button>
        </div>
      </div>
    </div>

    <div id="view-detail" style="display:none;flex-direction:column;flex:1">
      <div class="topbar">
        <button class="back-btn" onclick="showView('habits')">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 3L5 8l5 5"/></svg>
          Back
        </button>
        <div class="topbar-right">
          <button class="btn btn-ghost btn-sm" onclick="openEditModal()">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteCurrentHabit()">Delete</button>
        </div>
      </div>
      <div class="content-wrap" id="detail-container"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="habit-modal">
  <div class="modal">
    <h3 id="modal-title">New habit</h3>
    <div class="field"><label>Name</label><input type="text" id="h-name" placeholder="e.g. Read for 20 mins"/></div>
    <div class="field"><label>Description <span style="color:var(--muted)">(optional)</span></label><input type="text" id="h-desc" placeholder="Why this matters…"/></div>
    <div class="field">
      <label>Frequency</label>
      <select id="h-freq">
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
      </select>
    </div>
    <div id="modal-err" class="auth-err"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveHabit()">Save</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ── CONFIG ─────────────────────────────────────────────
// Change this to your Render URL before deploying to VERCEL
const API_BASE = 'https://oopstracker-updated.onrender.com';
  
// ── STATE ──────────────────────────────────────────────
let token = localStorage.getItem('ot_token') || '';
let currentUser = JSON.parse(localStorage.getItem('ot_user') || 'null');
let habits = [];
let currentHabit = null;
let editingHabitId = null;
let streakCache = {};
let todayLogsCache = {};

// ── BOOT ───────────────────────────────────────────────
(function init() {
  if (!token || !currentUser) return;
  // check token expiry
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    if (payload.exp && payload.exp * 1000 < Date.now()) {
      clearSession();
      return;
    }
  } catch { clearSession(); return; }
  bootApp();
})();

function bootApp() {
  document.getElementById('auth-page').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-name-display').textContent = currentUser.name || 'You';
  document.getElementById('user-avatar').textContent = (currentUser.name || 'U')[0].toUpperCase();
  loadHabits();
}

function clearSession() {
  token = ''; currentUser = null;
  localStorage.removeItem('ot_token');
  localStorage.removeItem('ot_user');
}

// ── AUTH ───────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) =>
    t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'))
  );
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('auth-err').textContent = '';
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-pass').value;
  if (!email || !password) { document.getElementById('auth-err').textContent = 'Fill in both fields.'; return; }
  setLoading('l', true);
  try {
    const r = await api('/auth/login', 'POST', { email, password }, false);
    handleLoginSuccess(r.token, email);
  } catch (e) {
    document.getElementById('auth-err').textContent = e.message;
  }
  setLoading('l', false);
}

async function doRegister() {
  const name = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const password = document.getElementById('r-pass').value;
  if (!name || !email || !password) { document.getElementById('auth-err').textContent = 'All fields are required.'; return; }
  setLoading('r', true);
  try {
    await api('/auth/register', 'POST', { name, email, password }, false);
    // auto-login after register
    const r = await api('/auth/login', 'POST', { email, password }, false);
    handleLoginSuccess(r.token, email, name);
  } catch (e) {
    document.getElementById('auth-err').textContent = e.message;
  }
  setLoading('r', false);
}

function handleLoginSuccess(tok, email, name) {
  token = tok;
  localStorage.setItem('ot_token', token);
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    const displayName = name || email.split('@')[0];
    currentUser = { id: payload.userId, name: displayName, email };
    localStorage.setItem('ot_user', JSON.stringify(currentUser));
  } catch { currentUser = { name: email }; }
  bootApp();
}

function doLogout() {
  clearSession();
  habits = []; currentHabit = null; streakCache = {}; todayLogsCache = {};
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-page').style.display = 'flex';
}

function setLoading(prefix, on) {
  document.getElementById(`${prefix}-spin`).style.display = on ? 'inline-block' : 'none';
  document.getElementById(`${prefix}-btn`).disabled = on;
}

// ── HABITS ─────────────────────────────────────────────
async function loadHabits() {
  try {
    habits = await api('/habits', 'GET');
    streakCache = {};
    todayLogsCache = {};

    await Promise.all(habits.map(async h => {
      const [streakRes, logsRes] = await Promise.all([
        api(`/habits/${h._id}/streak`, 'GET').catch(() => null),
        api(`/habits/${h._id}/logs`, 'GET').catch(() => []),
      ]);
      if (streakRes) streakCache[h._id] = streakRes;
      const today = new Date(); today.setHours(0, 0, 0, 0);
      todayLogsCache[h._id] = logsRes.some(l => new Date(l.date) >= today);
    }));

    renderHabits();
  } catch (e) { toast(e.message, 'error'); }
}

function renderHabits() {
  const el = document.getElementById('habits-container');
  if (!habits.length) {
    el.innerHTML = `<div class="empty-state"><div class="big">📋</div><p>Nothing tracked yet. Your streak starts today.</p><button class="btn btn-primary" onclick="openAddModal()">+ Add habit</button></div>`;
    return;
  }
  el.innerHTML = `<div class="habit-grid">${habits.map(h => {
    const s = streakCache[h._id];
    const curr = s ? (s['current streak'] ?? 0) : 0;
    const logged = todayLogsCache[h._id];
    return `<div class="habit-card${logged ? ' logged' : ''}" onclick="openDetail('${h._id}')">
      <div class="hc-top">
        <div>
          <div class="hc-name">${esc(h.name)}</div>
          <div class="hc-freq">${h.frequency}</div>
        </div>
        <div class="hc-streak">${curr}<span>day streak</span></div>
      </div>
      ${h.description ? `<div style="font-size:13px;color:var(--muted);margin-bottom:4px">${esc(h.description)}</div>` : ''}
      <div class="hc-actions">
        ${logged
          ? `<button class="btn btn-sm log-btn done" disabled>✓ Logged today</button>`
          : `<button class="btn btn-primary btn-sm log-btn" onclick="logHabit(event,'${h._id}')">Log today</button>`
        }
        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openEditModalFor('${h._id}')">Edit</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

async function logHabit(e, id) {
  e.stopPropagation();
  const btn = e.currentTarget;
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';
  try {
    await api(`/habits/${id}/log`, 'POST');
    toast('Logged!', 'success');
    todayLogsCache[id] = true;
    // refresh streak for this habit only
    const s = await api(`/habits/${id}/streak`, 'GET').catch(() => null);
    if (s) streakCache[id] = s;
    renderHabits();
    // if detail view is open for this habit, refresh it
    if (currentHabit && currentHabit._id === id) openDetail(id);
  } catch (err) {
    toast(err.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Log today';
  }
}

// ── DETAIL ─────────────────────────────────────────────
async function openDetail(id) {
  currentHabit = habits.find(h => h._id === id);
  if (!currentHabit) return;
  showView('detail');
  document.getElementById('detail-container').innerHTML = `<div style="color:var(--muted);font-size:13px;padding:20px 0">Loading…</div>`;
  try {
    const [logs, streak] = await Promise.all([
      api(`/habits/${id}/logs`, 'GET'),
      api(`/habits/${id}/streak`, 'GET'),
    ]);
    renderDetail(logs, streak);
  } catch (e) { toast(e.message, 'error'); }
}

function renderDetail(logs, streak) {
  const h = currentHabit;
  const curr = streak['current streak'] ?? 0;
  const max = streak['max streak'] ?? 0;
  const sorted = [...logs].sort((a, b) => new Date(b.date) - new Date(a.date));
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const loggedToday = logs.some(l => new Date(l.date) >= today);

  document.getElementById('detail-container').innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-title">${esc(h.name)}</div>
        ${h.description ? `<div class="detail-desc">${esc(h.description)}</div>` : ''}
      </div>
      <span style="font-size:11px;color:var(--muted);font-family:var(--mono);text-transform:uppercase">${h.frequency}</span>
    </div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-num">${curr}</div><div class="stat-label">Current streak</div></div>
      <div class="stat-box"><div class="stat-num">${max}</div><div class="stat-label">Best streak</div></div>
      <div class="stat-box"><div class="stat-num">${logs.length}</div><div class="stat-label">Total logs</div></div>
    </div>
    <div style="margin-bottom:20px">
      ${loggedToday
        ? `<button class="btn btn-sm log-btn done" disabled>✓ Logged today</button>`
        : `<button class="btn btn-primary btn-sm" id="detail-log-btn" onclick="logFromDetail('${h._id}')">Log today</button>`
      }
    </div>
    <div class="log-list">
      <div class="log-list-header">History</div>
      ${sorted.length
        ? sorted.map(l => `
          <div class="log-item">
            <span class="log-date">${fmt(l.date)}</span>
            <span class="log-done">✓ done</span>
          </div>`).join('')
        : `<div class="log-item" style="color:var(--muted)">No logs yet — start today.</div>`
      }
    </div>`;
}

async function logFromDetail(id) {
  const btn = document.getElementById('detail-log-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span>'; }
  try {
    await api(`/habits/${id}/log`, 'POST');
    toast('Logged!', 'success');
    todayLogsCache[id] = true;
    const [logs, streak] = await Promise.all([
      api(`/habits/${id}/logs`, 'GET'),
      api(`/habits/${id}/streak`, 'GET'),
    ]);
    streakCache[id] = streak;
    renderDetail(logs, streak);
    renderHabits();
  } catch (e) { toast(e.message, 'error'); }
}

// ── MODAL ──────────────────────────────────────────────
function openAddModal() {
  editingHabitId = null;
  document.getElementById('modal-title').textContent = 'New habit';
  document.getElementById('h-name').value = '';
  document.getElementById('h-desc').value = '';
  document.getElementById('h-freq').value = 'daily';
  document.getElementById('modal-err').textContent = '';
  document.getElementById('habit-modal').classList.add('open');
  setTimeout(() => document.getElementById('h-name').focus(), 50);
}

function openEditModalFor(id) {
  const h = habits.find(x => x._id === id);
  if (!h) return;
  editingHabitId = id;
  document.getElementById('modal-title').textContent = 'Edit habit';
  document.getElementById('h-name').value = h.name;
  document.getElementById('h-desc').value = h.description || '';
  document.getElementById('h-freq').value = h.frequency;
  document.getElementById('modal-err').textContent = '';
  document.getElementById('habit-modal').classList.add('open');
  setTimeout(() => document.getElementById('h-name').focus(), 50);
}

function openEditModal() {
  if (currentHabit) openEditModalFor(currentHabit._id);
}

function closeModal() {
  document.getElementById('habit-modal').classList.remove('open');
}

async function saveHabit() {
  const name = document.getElementById('h-name').value.trim();
  const description = document.getElementById('h-desc').value.trim();
  const frequency = document.getElementById('h-freq').value;
  document.getElementById('modal-err').textContent = '';
  if (!name) { document.getElementById('modal-err').textContent = 'Name is required.'; return; }

  const btn = document.getElementById('modal-save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Saving';

  try {
    if (editingHabitId) {
      await api(`/habits/${editingHabitId}`, 'PUT', { name, description, frequency });
      toast('Habit updated', 'success');
    } else {
      await api('/habits', 'POST', { name, description, frequency });
      toast('Habit created', 'success');
    }
    closeModal();
    await loadHabits();
    if (editingHabitId && currentHabit?._id === editingHabitId) openDetail(editingHabitId);
  } catch (e) {
    document.getElementById('modal-err').textContent = e.message;
  }

  btn.disabled = false;
  btn.textContent = 'Save';
}

async function deleteCurrentHabit() {
  if (!currentHabit) return;
  if (!confirm(`Delete "${currentHabit.name}"? This can't be undone.`)) return;
  try {
    await api(`/habits/${currentHabit._id}`, 'DELETE');
    toast('Habit deleted');
    currentHabit = null;
    showView('habits');
    await loadHabits();
  } catch (e) { toast(e.message, 'error'); }
}

// ── VIEWS ──────────────────────────────────────────────
function showView(v) {
  document.getElementById('view-habits').style.display = v === 'habits' ? 'flex' : 'none';
  document.getElementById('view-detail').style.display = v === 'detail' ? 'flex' : 'none';
}

// ── API ────────────────────────────────────────────────
async function api(path, method = 'GET', body, auth = true) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (auth) opts.headers['Authorization'] = `Bearer ${token}`;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API_BASE + path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || data.message || 'Something went wrong');
  return data;
}

// ── UTILS ──────────────────────────────────────────────
function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = `toast${type ? ' ' + type : ''}`;
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function esc(s = '') {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmt(d) {
  return new Date(d).toLocaleDateString('en-GB', {
    day: 'numeric', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

// ── EVENTS ─────────────────────────────────────────────
document.getElementById('habit-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('habit-modal').classList.contains('open')) saveHabit();
});
</script>
</body>
</html>
